<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-SOV 스코어카드 자동 채점기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: #2a2a3a;
  --border-active: #4a6cf7;
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --text-muted: #555568;
  --accent: #4a6cf7;
  --accent-glow: rgba(74,108,247,0.15);
  --green: #34d399;
  --green-dim: rgba(52,211,153,0.12);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.12);
  --orange: #fbbf24;
  --orange-dim: rgba(251,191,36,0.12);
  --chatgpt: #10a37f;
  --gemini: #8b5cf6;
  --google: #4285f4;
  --naver: #03c75a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}
.app-header {
  padding: 32px 40px 24px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(74,108,247,0.06) 0%, transparent 100%);
}
.app-header h1 {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.app-header h1 span { color: var(--accent); }
.app-header p { color: var(--text-dim); font-size: 14px; margin-top: 6px; }

.tabs {
  display: flex;
  gap: 0;
  padding: 0 40px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.tab {
  padding: 14px 24px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  user-select: none;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.content { padding: 32px 40px; max-width: 1400px; }

/* Step 1: Input */
.platform-section {
  margin-bottom: 32px;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  background: var(--surface);
}
.platform-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}
.platform-header:hover { background: var(--surface2); }
.platform-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.platform-header h3 { font-size: 15px; font-weight: 600; flex:1; }
.platform-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 3px 10px;
  border-radius: 20px;
  background: var(--surface2);
  color: var(--text-dim);
}
.platform-badge.done { background: var(--green-dim); color: var(--green); }
.platform-chevron {
  color: var(--text-muted);
  transition: transform 0.2s;
  font-size: 18px;
}
.platform-section.open .platform-chevron { transform: rotate(180deg); }
.platform-body { display: none; padding: 0 20px 20px; }
.platform-section.open .platform-body { display: block; }

.prompt-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 12px;
}
.prompt-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 4px;
}
.prompt-text {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 12px;
  padding: 8px 12px;
  background: rgba(74,108,247,0.06);
  border-radius: 6px;
  border-left: 3px solid var(--accent);
}
.run-row { display: flex; gap: 12px; margin-bottom: 8px; align-items: flex-start; }
.run-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  min-width: 40px;
  padding-top: 10px;
  font-family: 'JetBrains Mono', monospace;
}
.run-row textarea {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  resize: vertical;
  min-height: 60px;
  transition: border-color 0.2s;
  line-height: 1.5;
}
.run-row textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.run-row textarea.filled { border-color: var(--green); }

/* Step 2: Results */
.score-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}
.score-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
}
.score-card .label { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; font-weight: 500; }
.score-card .value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 32px;
  font-weight: 700;
}
.score-card .sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

.results-table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 24px;
}
.results-table-wrap h3 {
  padding: 16px 20px;
  font-size: 15px;
  font-weight: 600;
  border-bottom: 1px solid var(--border);
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
th {
  background: var(--surface2);
  padding: 10px 14px;
  text-align: left;
  font-weight: 600;
  font-size: 12px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td {
  padding: 10px 14px;
  border-bottom: 1px solid rgba(42,42,58,0.5);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
.chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
}
.chip-1 { background: var(--green-dim); color: var(--green); }
.chip-0 { background: var(--red-dim); color: var(--red); }
.platform-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
}

/* Buttons */
.btn {
  padding: 12px 28px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: #3a5ce6; transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-outline {
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--accent);
}
.btn-outline:hover { background: var(--accent-glow); }
.btn-green { background: var(--green); color: #000; }
.btn-green:hover { background: #2fc48d; }

.actions { display: flex; gap: 12px; margin-top: 24px; align-items: center; }
.actions .spacer { flex:1; }

.progress-bar {
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  margin: 20px 0;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--green));
  border-radius: 2px;
  transition: width 0.4s ease;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state p { font-size: 14px; }

.analyze-status {
  padding: 16px 20px;
  background: var(--accent-glow);
  border: 1px solid rgba(74,108,247,0.3);
  border-radius: 8px;
  margin-bottom: 20px;
  font-size: 14px;
  display: none;
}
.analyze-status.show { display: block; }

/* Summary cards in results */
.summary-section { margin-bottom: 32px; }
.summary-section h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.summary-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.summary-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.summary-box .box-header {
  padding: 14px 18px;
  font-size: 14px;
  font-weight: 700;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.summary-row {
  display: flex;
  justify-content: space-between;
  padding: 10px 18px;
  font-size: 13px;
  border-bottom: 1px solid rgba(42,42,58,0.3);
}
.summary-row:last-child { border-bottom: none; }
.summary-row .sr-label { color: var(--text-dim); }
.summary-row .sr-value { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
.summary-row.total { background: var(--surface2); font-weight: 700; }
.summary-row.total .sr-label { color: var(--text); }

@media (max-width: 900px) {
  .content { padding: 20px; }
  .score-grid { grid-template-columns: repeat(2, 1fr); }
  .summary-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="app-header">
  <h1><span>AI-SOV</span> 스코어카드 자동 채점기</h1>
  <p>KPR 인사이트 트리 vs 대학내일 20대연구소 · 4개 플랫폼 × 5개 프롬프트 × 2회 = 40개 응답</p>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('input')">① 응답 입력</div>
  <div class="tab" onclick="switchTab('results')">② 채점 결과</div>
  <div class="tab" onclick="switchTab('export')">③ 엑셀 다운로드</div>
</div>

<div class="content" id="content"></div>

<script>
const PLATFORMS = [
  { id: 'chatgpt', name: 'ChatGPT', color: '#10a37f' },
  { id: 'gemini', name: 'Gemini', color: '#8b5cf6' },
  { id: 'google_aio', name: 'Google AIO', color: '#4285f4' },
  { id: 'naver_aio', name: 'Naver AIO', color: '#03c75a' }
];

const PROMPTS = [
  { id: 'P01', text: '마케팅 트렌드 리포트 발행하는 곳 추천해줘' },
  { id: 'P02', text: 'PR회사에서 발행하는 트렌드 리포트 어떤게 있어?' },
  { id: 'P03', text: '마케터가 구독할만한 유료 리포트 추천해줘' },
  { id: 'P04', text: '요즘 20대가 술을 잘 안마시는 이유에 대해 참고할만한 리포트나 연구자료를 알려줘' },
  { id: 'P05', text: '소버 트렌드와 관련된 국내 조사나 보고서 출처를 알려줘' }
];

const KPR_KEYWORDS = [
  'KPR', 'kpr', 'KPR 인사이트 트리', 'KPR 인사이트트리',
  '인사이트 트리', '인사이트트리', 'Insight Tree', 'insight tree',
  'KPR Insight Tree', 'kpr insight tree'
];

const COMP_KEYWORDS = [
  '대학내일', '20대연구소', '20대 연구소', '대학내일20대연구소',
  '대학내일 20대연구소', '대학내일 20대 연구소', 'University Tomorrow',
  '대학내일20대', '20대연구소'
];

let responses = {};
let results = null;
let currentTab = 'input';

function initResponses() {
  PLATFORMS.forEach(p => {
    PROMPTS.forEach(q => {
      [1,2].forEach(run => {
        const key = `${p.id}_${q.id}_${run}`;
        if (!responses[key]) responses[key] = '';
      });
    });
  });
}
initResponses();

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['input','results','export'][i] === tab);
  });
  render();
}

function getFilledCount(platformId) {
  let count = 0;
  PROMPTS.forEach(q => {
    [1,2].forEach(run => {
      if (responses[`${platformId}_${q.id}_${run}`]?.trim()) count++;
    });
  });
  return count;
}

function getTotalFilled() {
  let count = 0;
  Object.values(responses).forEach(v => { if (v?.trim()) count++; });
  return count;
}

function detectBrands(text) {
  if (!text || !text.trim()) return { kpr: false, comp: false, kprRank: -1, compRank: -1, totalMentions: 0 };

  const kpr = KPR_KEYWORDS.some(k => text.includes(k));
  const comp = COMP_KEYWORDS.some(k => text.includes(k));

  // Try to detect ranking position
  let kprRank = -1, compRank = -1;
  const lines = text.split('\n');
  let brandPositions = [];

  lines.forEach((line, idx) => {
    const numMatch = line.match(/^[\s]*(\d+)[.\):\s]/);
    const rank = numMatch ? parseInt(numMatch[1]) : idx + 1;
    const hasKpr = KPR_KEYWORDS.some(k => line.includes(k));
    const hasComp = COMP_KEYWORDS.some(k => line.includes(k));
    if (hasKpr && kprRank === -1) kprRank = rank;
    if (hasComp && compRank === -1) compRank = rank;
  });

  // Count total unique brands mentioned (rough estimate by counting numbered items)
  let totalMentions = 0;
  lines.forEach(line => {
    if (line.match(/^[\s]*\d+[.\):\s]/) && line.trim().length > 5) totalMentions++;
  });
  if (totalMentions === 0 && (kpr || comp)) totalMentions = (kpr ? 1 : 0) + (comp ? 1 : 0);

  return { kpr, comp, kprRank, compRank, totalMentions };
}

function analyzeAll() {
  const rows = [];
  let no = 1;

  PLATFORMS.forEach(platform => {
    PROMPTS.forEach(prompt => {
      [1,2].forEach(run => {
        const key = `${platform.id}_${prompt.id}_${run}`;
        const text = responses[key] || '';
        const detection = detectBrands(text);

        const kprTop1 = detection.kpr && detection.kprRank === 1 ? 1 : 0;
        const compTop1 = detection.comp && detection.compRank === 1 ? 1 : 0;
        const kprTop4 = detection.kpr && detection.kprRank >= 1 && detection.kprRank <= 4 ? 1 : 0;
        const compTop4 = detection.comp && detection.compRank >= 1 && detection.compRank <= 4 ? 1 : 0;
        const kprMention = detection.kpr ? 1 : 0;
        const compMention = detection.comp ? 1 : 0;

        rows.push({
          no: no++,
          platform: platform.name,
          platformId: platform.id,
          promptNo: prompt.id,
          promptText: prompt.text,
          run,
          kprTop1, compTop1,
          kprTop4, compTop4,
          kprMention, compMention,
          totalMentions: detection.totalMentions,
          hasResponse: text.trim().length > 0
        });
      });
    });
  });

  results = { rows, computed: computeAggregates(rows) };
  switchTab('results');
}

function computeAggregates(rows) {
  const agg = {};

  // Platform aggregates
  PLATFORMS.forEach(p => {
    const pRows = rows.filter(r => r.platformId === p.id);
    agg[p.id] = {
      kprTop1: pRows.reduce((s,r) => s + r.kprTop1, 0),
      compTop1: pRows.reduce((s,r) => s + r.compTop1, 0),
      kprTop4: pRows.reduce((s,r) => s + r.kprTop4, 0),
      compTop4: pRows.reduce((s,r) => s + r.compTop4, 0),
      kprMention: pRows.reduce((s,r) => s + r.kprMention, 0),
      compMention: pRows.reduce((s,r) => s + r.compMention, 0),
    };
  });

  // Totals
  agg.total = {
    kprTop1: rows.reduce((s,r) => s + r.kprTop1, 0),
    compTop1: rows.reduce((s,r) => s + r.compTop1, 0),
    kprTop4: rows.reduce((s,r) => s + r.kprTop4, 0),
    compTop4: rows.reduce((s,r) => s + r.compTop4, 0),
    kprMention: rows.reduce((s,r) => s + r.kprMention, 0),
    compMention: rows.reduce((s,r) => s + r.compMention, 0),
  };

  return agg;
}

function sovPct(kpr, comp) {
  const total = kpr + comp;
  if (total === 0) return '-';
  return (kpr / total * 100).toFixed(1) + '%';
}

function chip(val) {
  return `<span class="chip chip-${val}">${val}</span>`;
}

function platformTag(name) {
  const p = PLATFORMS.find(x => x.name === name);
  const color = p ? p.color : '#888';
  return `<span class="platform-tag" style="background:${color}">${name}</span>`;
}

function render() {
  const el = document.getElementById('content');
  if (currentTab === 'input') renderInput(el);
  else if (currentTab === 'results') renderResults(el);
  else renderExport(el);
}

function renderInput(el) {
  const total = getTotalFilled();
  const pct = (total / 40 * 100).toFixed(0);

  let html = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <span style="font-size:14px;color:var(--text-dim);">입력 진행률</span>
      <span style="font-family:'JetBrains Mono';font-size:14px;color:var(--accent);">${total}/40 (${pct}%)</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:24px;">
      각 플랫폼에서 프롬프트를 입력한 뒤, AI 응답 전체를 복사해서 아래에 붙여넣으세요. 시크릿 모드에서 동일 프롬프트를 2회 반복합니다.
    </p>
  `;

  PLATFORMS.forEach(p => {
    const filled = getFilledCount(p.id);
    const isOpen = filled < 10;
    html += `
      <div class="platform-section ${isOpen ? 'open' : ''}" id="section-${p.id}">
        <div class="platform-header" onclick="toggleSection('${p.id}')">
          <div class="platform-dot" style="background:${p.color}"></div>
          <h3>${p.name}</h3>
          <span class="platform-badge ${filled === 10 ? 'done' : ''}">${filled}/10</span>
          <span class="platform-chevron">▾</span>
        </div>
        <div class="platform-body">
    `;

    PROMPTS.forEach(q => {
      html += `
        <div class="prompt-card">
          <div class="prompt-label">${q.id}</div>
          <div class="prompt-text">${q.text}</div>
      `;
      [1,2].forEach(run => {
        const key = `${p.id}_${q.id}_${run}`;
        const val = responses[key] || '';
        const filledClass = val.trim() ? 'filled' : '';
        html += `
          <div class="run-row">
            <span class="run-label">${run}차</span>
            <textarea class="${filledClass}" placeholder="AI 응답을 여기에 붙여넣으세요..." 
              oninput="updateResponse('${key}', this)">${escapeHtml(val)}</textarea>
          </div>
        `;
      });
      html += `</div>`;
    });

    html += `</div></div>`;
  });

  html += `
    <div class="actions">
      <div class="spacer"></div>
      <button class="btn btn-primary" onclick="analyzeAll()" ${total === 0 ? 'disabled' : ''}>
        🔍 자동 채점 실행
      </button>
    </div>
  `;

  el.innerHTML = html;
}

function renderResults(el) {
  if (!results) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="icon">📊</div>
        <p>먼저 ① 응답 입력 탭에서 AI 응답을 입력한 뒤 채점을 실행하세요.</p>
      </div>
    `;
    return;
  }

  const { rows, computed } = results;
  const t = computed.total;

  let html = `
    <div class="score-grid">
      <div class="score-card">
        <div class="label">종합 AI-SOV</div>
        <div class="value" style="color:var(--accent)">${sovPct(t.kprMention, t.compMention)}</div>
        <div class="sub">KPR 전체 언급 점유율</div>
      </div>
      <div class="score-card">
        <div class="label">AI-TOP1 점유율</div>
        <div class="value" style="color:var(--orange)">${sovPct(t.kprTop1, t.compTop1)}</div>
        <div class="sub">1위 노출 기준</div>
      </div>
      <div class="score-card">
        <div class="label">AI-TOP4 점유율</div>
        <div class="value" style="color:var(--green)">${sovPct(t.kprTop4, t.compTop4)}</div>
        <div class="sub">상위 4위 노출 기준</div>
      </div>
      <div class="score-card">
        <div class="label">KPR 총 언급</div>
        <div class="value">${t.kprMention}</div>
        <div class="sub">/ 40회 (${(t.kprMention/40*100).toFixed(0)}%)</div>
      </div>
    </div>
  `;

  // Summary tables
  html += `<div class="summary-section"><h3>플랫폼별 집계</h3><div class="summary-grid">`;

  ['AI-TOP1 (1위 노출)', 'AI-TOP4 (상위 4위)', 'AI-SOV (전체 언급)'].forEach((title, idx) => {
    const kprKey = ['kprTop1','kprTop4','kprMention'][idx];
    const compKey = ['compTop1','compTop4','compMention'][idx];

    html += `<div class="summary-box"><div class="box-header">${title}</div>`;
    PLATFORMS.forEach(p => {
      const k = computed[p.id][kprKey];
      const c = computed[p.id][compKey];
      html += `
        <div class="summary-row">
          <span class="sr-label">${p.name}</span>
          <span class="sr-value">${k} vs ${c} → ${sovPct(k,c)}</span>
        </div>
      `;
    });
    html += `
      <div class="summary-row total">
        <span class="sr-label">합계</span>
        <span class="sr-value">${t[kprKey]} vs ${t[compKey]} → ${sovPct(t[kprKey], t[compKey])}</span>
      </div>
    </div>`;
  });
  html += `</div></div>`;

  // Detail table
  html += `
    <div class="results-table-wrap">
      <h3>전체 상세 채점표 (40개 응답)</h3>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>No</th><th>Platform</th><th>Prompt</th><th>Run</th>
              <th>KPR Top1</th><th>경쟁 Top1</th>
              <th>KPR Top4</th><th>경쟁 Top4</th>
              <th>KPR 언급</th><th>경쟁 언급</th>
            </tr>
          </thead>
          <tbody>
  `;

  rows.forEach(r => {
    if (!r.hasResponse) {
      html += `
        <tr style="opacity:0.35">
          <td>${r.no}</td><td>${platformTag(r.platform)}</td><td>${r.promptNo}</td><td>${r.run}차</td>
          <td colspan="6" style="color:var(--text-muted);font-size:12px;">미입력</td>
        </tr>`;
    } else {
      html += `
        <tr>
          <td>${r.no}</td><td>${platformTag(r.platform)}</td><td>${r.promptNo}</td><td>${r.run}차</td>
          <td>${chip(r.kprTop1)}</td><td>${chip(r.compTop1)}</td>
          <td>${chip(r.kprTop4)}</td><td>${chip(r.compTop4)}</td>
          <td>${chip(r.kprMention)}</td><td>${chip(r.compMention)}</td>
        </tr>`;
    }
  });

  html += `</tbody></table></div></div>`;

  html += `
    <div class="actions">
      <button class="btn btn-outline" onclick="switchTab('input')">← 입력으로 돌아가기</button>
      <div class="spacer"></div>
      <button class="btn btn-primary" onclick="analyzeAll()">🔄 다시 채점</button>
      <button class="btn btn-green" onclick="switchTab('export')">📥 엑셀 다운로드</button>
    </div>
  `;

  el.innerHTML = html;
}

function renderExport(el) {
  if (!results) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="icon">📥</div>
        <p>먼저 채점을 완료한 뒤 엑셀을 다운로드할 수 있습니다.</p>
      </div>
    `;
    return;
  }

  el.innerHTML = `
    <div style="text-align:center;padding:60px 20px;">
      <div style="font-size:48px;margin-bottom:20px;">📊</div>
      <h2 style="margin-bottom:12px;">엑셀 파일 다운로드</h2>
      <p style="color:var(--text-dim);margin-bottom:8px;">채점 결과를 원본 양식에 맞춰 CSV로 다운로드합니다.</p>
      <p style="color:var(--text-muted);font-size:13px;margin-bottom:32px;">
        다운로드 후 원본 엑셀 파일에 붙여넣기 하시면 수식이 걸린 다른 탭도 자동으로 채워집니다.
      </p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-green" onclick="downloadScoreCSV()">📥 스코어카드 CSV</button>
        <button class="btn btn-outline" onclick="downloadSummaryCSV()">📥 집계표 CSV</button>
      </div>
    </div>
  `;
}

function downloadScoreCSV() {
  if (!results) return;
  let csv = '\uFEFFNo,Platform,Prompt No.,Prompt,Run,KPR_Top1,경쟁사_Top1,KPR_Top4,경쟁사_Top4,KPR_Mention,경쟁사_Mention\n';
  results.rows.forEach(r => {
    csv += `${r.no},${r.platform},${r.promptNo},"${r.promptText}",${r.run},${r.kprTop1},${r.compTop1},${r.kprTop4},${r.compTop4},${r.kprMention},${r.compMention}\n`;
  });
  downloadFile(csv, 'AI-SOV_스코어카드_채점결과.csv', 'text/csv;charset=utf-8');
}

function downloadSummaryCSV() {
  if (!results) return;
  const c = results.computed;
  const t = c.total;
  let csv = '\uFEFF=== AI-TOP1 (1위 노출률) ===\nPlatform,KPR 합계,경쟁사 합계,전체,KPR 점유율\n';
  PLATFORMS.forEach(p => {
    const k = c[p.id].kprTop1, co = c[p.id].compTop1;
    csv += `${p.name},${k},${co},${k+co},${sovPct(k,co)}\n`;
  });
  csv += `합계,${t.kprTop1},${t.compTop1},${t.kprTop1+t.compTop1},${sovPct(t.kprTop1,t.compTop1)}\n\n`;

  csv += '=== AI-TOP4 (상위 4위 노출률) ===\nPlatform,KPR 합계,경쟁사 합계,전체,KPR 점유율\n';
  PLATFORMS.forEach(p => {
    const k = c[p.id].kprTop4, co = c[p.id].compTop4;
    csv += `${p.name},${k},${co},${k+co},${sovPct(k,co)}\n`;
  });
  csv += `합계,${t.kprTop4},${t.compTop4},${t.kprTop4+t.compTop4},${sovPct(t.kprTop4,t.compTop4)}\n\n`;

  csv += '=== AI-SOV (전체 언급률) ===\nPlatform,KPR 합계,경쟁사 합계,전체,KPR 점유율\n';
  PLATFORMS.forEach(p => {
    const k = c[p.id].kprMention, co = c[p.id].compMention;
    csv += `${p.name},${k},${co},${k+co},${sovPct(k,co)}\n`;
  });
  csv += `합계,${t.kprMention},${t.compMention},${t.kprMention+t.compMention},${sovPct(t.kprMention,t.compMention)}\n`;

  downloadFile(csv, 'AI-SOV_집계표.csv', 'text/csv;charset=utf-8');
}

function downloadFile(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function toggleSection(id) {
  document.getElementById('section-' + id).classList.toggle('open');
}

function updateResponse(key, textarea) {
  responses[key] = textarea.value;
  textarea.classList.toggle('filled', textarea.value.trim().length > 0);
  // Update badge
  const platformId = key.split('_')[0];
  const badge = document.querySelector(`#section-${platformId} .platform-badge`);
  if (badge) {
    const filled = getFilledCount(platformId);
    badge.textContent = `${filled}/10`;
    badge.classList.toggle('done', filled === 10);
  }
  // Update progress
  const total = getTotalFilled();
  const pct = (total / 40 * 100).toFixed(0);
  const fill = document.querySelector('.progress-fill');
  if (fill) fill.style.width = pct + '%';
  // Update button
  const btn = document.querySelector('.btn-primary');
  if (btn && btn.textContent.includes('채점')) btn.disabled = total === 0;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

render();
</script>
</body>
</html>
