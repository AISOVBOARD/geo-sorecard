<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-SOV 스코어카드 자동 채점기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#06060c;--surface:#0e0e18;--surface2:#161624;--surface3:#1e1e30;--border:#2a2a42;--text:#eeeef4;--text-dim:#9191ab;--text-muted:#5c5c78;--accent:#6366f1;--accent2:#818cf8;--accent-glow:rgba(99,102,241,.12);--accent-glow2:rgba(99,102,241,.25);--green:#34d399;--green-dim:rgba(52,211,153,.10);--red:#fb7185;--red-dim:rgba(251,113,133,.10);--orange:#fbbf24;--cyan:#22d3ee;--radius:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR','Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{padding:28px 36px 20px;background:linear-gradient(180deg,rgba(99,102,241,.08) 0%,transparent 100%);border-bottom:1px solid var(--border)}
.header h1{font-family:'Outfit',sans-serif;font-size:22px;font-weight:700;letter-spacing:-.5px}
.header h1 span{background:linear-gradient(135deg,var(--accent),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--text-dim);font-size:13px;margin-top:4px}
.steps-nav{display:flex;gap:0;padding:0 36px;border-bottom:1px solid var(--border);background:var(--surface)}
.step-tab{display:flex;align-items:center;gap:8px;padding:14px 24px;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;user-select:none}
.step-tab:hover{color:var(--text-dim)}
.step-tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.step-tab.done{color:var(--green)}
.step-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--surface3);color:var(--text-muted);font-family:'JetBrains Mono',monospace}
.step-tab.active .step-num{background:var(--accent);color:#fff}
.step-tab.done .step-num{background:var(--green);color:#000}
.content{padding:28px 36px;max-width:1400px}
.prompt-setup-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.prompt-setup-header h2{font-size:17px;font-weight:700}
.add-prompt-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;background:var(--accent-glow);color:var(--accent2);border:1px solid rgba(99,102,241,.3);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.add-prompt-btn:hover{background:var(--accent-glow2)}
.add-prompt-btn:disabled{opacity:.3;cursor:not-allowed}
.prompt-input-card{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:10px;transition:border-color .2s}
.prompt-input-card:focus-within{border-color:var(--accent)}
.prompt-num{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--accent2);min-width:28px}
.prompt-input-card input{flex:1;background:transparent;border:none;color:var(--text);font-size:14px;font-family:inherit;outline:none}
.prompt-input-card input::placeholder{color:var(--text-muted)}
.remove-prompt{width:28px;height:28px;border-radius:6px;background:transparent;border:1px solid transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
.remove-prompt:hover{background:var(--red-dim);color:var(--red);border-color:rgba(251,113,133,.3)}
.keyword-section{margin-top:24px;padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.keyword-section h3{font-size:14px;font-weight:600;margin-bottom:12px}
.keyword-row{display:flex;gap:12px;margin-bottom:10px;align-items:center}
.keyword-row label{font-size:13px;color:var(--text-dim);min-width:120px;font-weight:500}
.keyword-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.keyword-row input:focus{border-color:var(--accent)}
.next-btn{margin-top:24px;padding:12px 32px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;float:right}
.next-btn:hover{background:#5558e6;transform:translateY(-1px)}
.next-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.platform-section{margin-bottom:16px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--surface)}
.platform-header{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;user-select:none;transition:background .15s}
.platform-header:hover{background:var(--surface2)}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.platform-header h3{font-size:14px;font-weight:600;flex:1}
.pbadge{font-family:'JetBrains Mono',monospace;font-size:11px;padding:2px 10px;border-radius:20px;background:var(--surface3);color:var(--text-muted)}
.pbadge.done{background:var(--green-dim);color:var(--green)}
.pchevron{color:var(--text-muted);transition:transform .2s;font-size:16px}
.platform-section.open .pchevron{transform:rotate(180deg)}
.platform-body{display:none;padding:0 18px 18px}
.platform-section.open .platform-body{display:block}
.prompt-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px}
.pc-label{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--accent2);margin-bottom:3px}
.pc-text{font-size:12px;color:var(--text-dim);margin-bottom:10px;padding:6px 10px;background:rgba(99,102,241,.05);border-radius:5px;border-left:2px solid var(--accent)}
.run-row{display:flex;gap:10px;margin-bottom:6px;align-items:flex-start}
.run-label{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--text-muted);min-width:32px;padding-top:9px}
.run-row textarea{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-family:inherit;font-size:12px;resize:vertical;min-height:50px;transition:border-color .2s;line-height:1.5}
.run-row textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow)}
.run-row textarea.filled{border-color:var(--green)}
.progress-wrap{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.progress-wrap span{font-size:13px}
.progress-bar{height:3px;background:var(--surface3);border-radius:2px;margin-bottom:20px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;transition:width .3s}
.action-bar{display:flex;gap:12px;margin-top:20px;justify-content:flex-end}
.score-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:center}
.scard .sl{font-size:11px;color:var(--text-dim);margin-bottom:6px;font-weight:500}
.scard .sv{font-family:'Outfit','JetBrains Mono',monospace;font-size:30px;font-weight:800}
.scard .ss{font-size:11px;color:var(--text-muted);margin-top:3px}
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.sbox{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.sbox .sh{padding:12px 16px;font-size:13px;font-weight:700;border-bottom:1px solid var(--border);background:var(--surface2)}
.srow{display:flex;justify-content:space-between;padding:9px 16px;font-size:12px;border-bottom:1px solid rgba(42,42,66,.3)}
.srow:last-child{border-bottom:none}
.srow .sl2{color:var(--text-dim)}
.srow .sv2{font-family:'JetBrains Mono',monospace;font-weight:600}
.srow.total{background:var(--surface2);font-weight:700}
.srow.total .sl2{color:var(--text)}
.rtable-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.rtable-wrap h3{padding:14px 18px;font-size:14px;font-weight:600;border-bottom:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--surface2);padding:8px 12px;text-align:left;font-weight:600;font-size:11px;color:var(--text-dim);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid rgba(42,42,66,.4)}
tr:last-child td{border-bottom:none}
.chip{display:inline-block;padding:1px 7px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700}
.chip-1{background:var(--green-dim);color:var(--green)}
.chip-0{background:rgba(92,92,120,.15);color:var(--text-muted)}
.ptag{display:inline-block;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:700;color:#fff}
.btn{padding:10px 24px;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#5558e6}
.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-outline{background:transparent;color:var(--accent2);border:1px solid var(--accent)}
.btn-outline:hover{background:var(--accent-glow)}
.btn-green{background:var(--green);color:#000;font-weight:700}
.btn-green:hover{background:#2fc48d}
@media(max-width:900px){.content{padding:16px}.score-cards{grid-template-columns:repeat(2,1fr)}.summary-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <h1><span>AI-SOV</span> 스코어카드 자동 채점기</h1>
  <p>범용 GEO 측정 도구 · 프롬프트 최대 10개 · 4개 플랫폼 × 2회 반복</p>
</div>
<div class="steps-nav">
  <div class="step-tab active" onclick="goStep(1)" id="st1"><span class="step-num">1</span> 프롬프트 설정</div>
  <div class="step-tab" onclick="goStep(2)" id="st2"><span class="step-num">2</span> 응답 입력</div>
  <div class="step-tab" onclick="goStep(3)" id="st3"><span class="step-num">3</span> 채점 결과</div>
</div>
<div class="content" id="app"></div>
<script>
const PL=[{id:'chatgpt',name:'ChatGPT',color:'#10a37f'},{id:'gemini',name:'Gemini',color:'#8b5cf6'},{id:'google_aio',name:'Google AIO',color:'#4285f4'},{id:'naver_aio',name:'Naver AIO',color:'#03c75a'}];
let S={step:1,prompts:['','','','',''],brandKw:'KPR, 인사이트 트리, 인사이트트리, KPR Insight Tree',compKw:'대학내일, 20대연구소, 대학내일20대연구소, 대학내일 20대연구소',resp:{},res:null};
function goStep(n){if(n===2&&gAP().length===0)return;if(n===3&&!S.res)return;S.step=n;render()}
function gAP(){return S.prompts.filter(p=>p.trim()).map((p,i)=>({id:`P${String(i+1).padStart(2,'0')}`,text:p.trim()}))}
function gTS(){return gAP().length*PL.length*2}
function gFC(pid){let c=0;gAP().forEach(q=>{[1,2].forEach(r=>{if((S.resp[`${pid}_${q.id}_${r}`]||'').trim())c++})});return c}
function gTF(){let c=0;Object.values(S.resp).forEach(v=>{if(v?.trim())c++});return c}
function pKw(s){return s.split(',').map(x=>x.trim()).filter(x=>x)}
function detect(text){if(!text?.trim())return{b:false,c:false,br:-1,cr:-1};const bk=pKw(S.brandKw),ck=pKw(S.compKw);const b=bk.some(k=>text.toLowerCase().includes(k.toLowerCase()));const c=ck.some(k=>text.toLowerCase().includes(k.toLowerCase()));let br=-1,cr=-1;const lines=text.split('\n');lines.forEach(l=>{const m=l.match(/^[\s]*(\d+)[.\):\s]/);const rk=m?parseInt(m[1]):-1;if(rk>0){if(br===-1&&bk.some(k=>l.toLowerCase().includes(k.toLowerCase())))br=rk;if(cr===-1&&ck.some(k=>l.toLowerCase().includes(k.toLowerCase())))cr=rk}});if(br===-1&&b)lines.forEach((l,i)=>{if(br===-1&&bk.some(k=>l.toLowerCase().includes(k.toLowerCase())))br=i+1});if(cr===-1&&c)lines.forEach((l,i)=>{if(cr===-1&&ck.some(k=>l.toLowerCase().includes(k.toLowerCase())))cr=i+1});return{b,c,br,cr}}
function analyze(){const ps=gAP(),rows=[];let no=1;PL.forEach(p=>{ps.forEach(q=>{[1,2].forEach(run=>{const k=`${p.id}_${q.id}_${run}`,t=S.resp[k]||'',d=detect(t);rows.push({no:no++,platform:p.name,pid:p.id,pno:q.id,ptxt:q.text,run,bT1:d.b&&d.br===1?1:0,cT1:d.c&&d.cr===1?1:0,bT4:d.b&&d.br>=1&&d.br<=4?1:0,cT4:d.c&&d.cr>=1&&d.cr<=4?1:0,bM:d.b?1:0,cM:d.c?1:0,has:t.trim().length>0})})})});const ag={};PL.forEach(p=>{const pr=rows.filter(r=>r.pid===p.id);ag[p.id]={bT1:pr.reduce((s,r)=>s+r.bT1,0),cT1:pr.reduce((s,r)=>s+r.cT1,0),bT4:pr.reduce((s,r)=>s+r.bT4,0),cT4:pr.reduce((s,r)=>s+r.cT4,0),bM:pr.reduce((s,r)=>s+r.bM,0),cM:pr.reduce((s,r)=>s+r.cM,0)}});ag.total={bT1:rows.reduce((s,r)=>s+r.bT1,0),cT1:rows.reduce((s,r)=>s+r.cT1,0),bT4:rows.reduce((s,r)=>s+r.bT4,0),cT4:rows.reduce((s,r)=>s+r.cT4,0),bM:rows.reduce((s,r)=>s+r.bM,0),cM:rows.reduce((s,r)=>s+r.cM,0)};S.res={rows,ag};goStep(3)}
function sov(a,b){const t=a+b;return t===0?'-':(a/t*100).toFixed(1)+'%'}
function chip(v){return`<span class="chip chip-${v}">${v}</span>`}
function ptag(n){const p=PL.find(x=>x.name===n);return`<span class="ptag" style="background:${p?p.color:'#888'}">${n}</span>`}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function render(){document.querySelectorAll('.step-tab').forEach((t,i)=>{t.classList.toggle('active',i+1===S.step);if(i===0&&gAP().length>0&&S.step>1)t.classList.add('done');else if(i===1&&S.res)t.classList.add('done');else t.classList.remove('done')});const el=document.getElementById('app');if(S.step===1)r1(el);else if(S.step===2)r2(el);else r3(el)}
function r1(el){const ca=S.prompts.length<10;let h=`<div class="prompt-setup-header"><h2>프롬프트 설정 (${S.prompts.length}/10)</h2><button class="add-prompt-btn" onclick="addP()" ${ca?'':'disabled'}>＋ 프롬프트 추가</button></div><p style="font-size:13px;color:var(--text-muted);margin-bottom:16px">AI 플랫폼에 입력할 프롬프트를 작성하세요. 최소 1개, 최대 10개까지 입력 가능합니다.</p>`;S.prompts.forEach((p,i)=>{h+=`<div class="prompt-input-card"><span class="prompt-num">P${String(i+1).padStart(2,'0')}</span><input type="text" value="${esc(p)}" placeholder="프롬프트를 입력하세요..." oninput="upP(${i},this.value)">${S.prompts.length>1?`<button class="remove-prompt" onclick="rmP(${i})">✕</button>`:''}</div>`});h+=`<div class="keyword-section"><h3>감지 키워드 설정</h3><p style="font-size:12px;color:var(--text-muted);margin-bottom:14px">쉼표(,)로 구분해서 입력하세요. AI 응답에서 이 키워드가 포함되면 언급으로 판정합니다.</p><div class="keyword-row"><label style="color:var(--accent2)">우리 브랜드</label><input value="${esc(S.brandKw)}" oninput="S.brandKw=this.value" placeholder="KPR, 인사이트 트리, ..."></div><div class="keyword-row"><label style="color:var(--red)">경쟁사</label><input value="${esc(S.compKw)}" oninput="S.compKw=this.value" placeholder="대학내일, 20대연구소, ..."></div></div><button class="next-btn" onclick="goStep(2)" ${gAP().length>0?'':'disabled'}>다음: 응답 입력 →</button><div style="clear:both"></div>`;el.innerHTML=h}
function r2(el){const ps=gAP(),ts=gTS(),fi=gTF(),pc=ts>0?(fi/ts*100).toFixed(0):0;let h=`<div class="progress-wrap"><span style="color:var(--text-dim)">응답 입력 진행률</span><span style="font-family:'JetBrains Mono';color:var(--accent2)">${fi}/${ts} (${pc}%)</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pc}%"></div></div><p style="font-size:12px;color:var(--text-muted);margin-bottom:20px">각 플랫폼에서 프롬프트를 입력한 뒤, AI 응답 전체를 복사해서 붙여넣으세요. 시크릿 모드에서 동일 프롬프트 2회 반복합니다.</p>`;PL.forEach(p=>{const pf=gFC(p.id),pt=ps.length*2,io=pf<pt;h+=`<div class="platform-section ${io?'open':''}" id="sec-${p.id}"><div class="platform-header" onclick="document.getElementById('sec-${p.id}').classList.toggle('open')"><div class="pdot" style="background:${p.color}"></div><h3>${p.name}</h3><span class="pbadge ${pf===pt?'done':''}">${pf}/${pt}</span><span class="pchevron">▾</span></div><div class="platform-body">`;ps.forEach(q=>{h+=`<div class="prompt-card"><div class="pc-label">${q.id}</div><div class="pc-text">${esc(q.text)}</div>`;[1,2].forEach(run=>{const k=`${p.id}_${q.id}_${run}`,v=S.resp[k]||'';h+=`<div class="run-row"><span class="run-label">${run}차</span><textarea class="${v.trim()?'filled':''}" placeholder="AI 응답을 여기에 붙여넣으세요..." oninput="upR('${k}',this)">${esc(v)}</textarea></div>`});h+=`</div>`});h+=`</div></div>`});h+=`<div class="action-bar"><button class="btn btn-outline" onclick="goStep(1)">← 프롬프트 수정</button><button class="btn btn-primary" onclick="analyze()" ${fi===0?'disabled':''}>🔍 자동 채점 실행</button></div>`;el.innerHTML=h}
function r3(el){if(!S.res){el.innerHTML='<p>채점 결과가 없습니다.</p>';return}const{rows,ag}=S.res,t=ag.total,bl=pKw(S.brandKw)[0]||'브랜드';let h=`<div class="score-cards"><div class="scard"><div class="sl">종합 AI-SOV</div><div class="sv" style="color:var(--accent2)">${sov(t.bM,t.cM)}</div><div class="ss">${bl} 전체 언급 점유율</div></div><div class="scard"><div class="sl">AI-TOP1 점유율</div><div class="sv" style="color:var(--orange)">${sov(t.bT1,t.cT1)}</div><div class="ss">1위 노출 기준</div></div><div class="scard"><div class="sl">AI-TOP4 점유율</div><div class="sv" style="color:var(--green)">${sov(t.bT4,t.cT4)}</div><div class="ss">상위 4위 노출 기준</div></div><div class="scard"><div class="sl">${bl} 총 언급</div><div class="sv">${t.bM}</div><div class="ss">/ ${rows.length}회 (${rows.length>0?(t.bM/rows.length*100).toFixed(0):0}%)</div></div></div>`;h+=`<div class="summary-grid">`;[['AI-TOP1','bT1','cT1'],['AI-TOP4','bT4','cT4'],['AI-SOV','bM','cM']].forEach(([ti,bk,ck])=>{h+=`<div class="sbox"><div class="sh">${ti}</div>`;PL.forEach(p=>{const b=ag[p.id][bk],c=ag[p.id][ck];h+=`<div class="srow"><span class="sl2">${p.name}</span><span class="sv2">${b} vs ${c} → ${sov(b,c)}</span></div>`});h+=`<div class="srow total"><span class="sl2">합계</span><span class="sv2">${t[bk]} vs ${t[ck]} → ${sov(t[bk],t[ck])}</span></div></div>`});h+=`</div>`;h+=`<div class="rtable-wrap"><h3>전체 상세 채점표 (${rows.length}개 응답)</h3><div style="overflow-x:auto"><table><thead><tr><th>No</th><th>Platform</th><th>Prompt</th><th>Run</th><th>${bl} Top1</th><th>경쟁 Top1</th><th>${bl} Top4</th><th>경쟁 Top4</th><th>${bl} 언급</th><th>경쟁 언급</th></tr></thead><tbody>`;rows.forEach(r=>{if(!r.has){h+=`<tr style="opacity:.3"><td>${r.no}</td><td>${ptag(r.platform)}</td><td>${r.pno}</td><td>${r.run}차</td><td colspan="6" style="color:var(--text-muted);font-size:11px">미입력</td></tr>`}else{h+=`<tr><td>${r.no}</td><td>${ptag(r.platform)}</td><td>${r.pno}</td><td>${r.run}차</td><td>${chip(r.bT1)}</td><td>${chip(r.cT1)}</td><td>${chip(r.bT4)}</td><td>${chip(r.cT4)}</td><td>${chip(r.bM)}</td><td>${chip(r.cM)}</td></tr>`}});h+=`</tbody></table></div></div>`;h+=`<div class="action-bar"><button class="btn btn-outline" onclick="goStep(2)">← 응답 수정</button><button class="btn btn-primary" onclick="analyze()">🔄 다시 채점</button><button class="btn btn-green" onclick="dlXlsx()">📥 엑셀 다운로드</button></div>`;el.innerHTML=h}
function addP(){if(S.prompts.length<10){S.prompts.push('');render()}}
function rmP(i){if(S.prompts.length>1){S.prompts.splice(i,1);render()}}
function upP(i,v){S.prompts[i]=v}
function upR(k,ta){S.resp[k]=ta.value;ta.classList.toggle('filled',ta.value.trim().length>0)}
function dlXlsx(){if(!S.res)return;const{rows,ag}=S.res,t=ag.total,bl=pKw(S.brandKw)[0]||'브랜드';const s1=[['AI-SOV 스코어카드'],['No','Platform','Prompt No.','Prompt','Run',`${bl}_Top1`,'경쟁사_Top1',`${bl}_Top4`,'경쟁사_Top4',`${bl}_Mention`,'경쟁사_Mention']];rows.forEach(r=>{s1.push([r.no,r.platform,r.pno,r.ptxt,r.run,r.bT1,r.cT1,r.bT4,r.cT4,r.bM,r.cM])});const s2=[['AI-SOV 집계'],[],['📊 AI-TOP1'],['Platform',`${bl} 합계`,'경쟁사 합계','전체',`${bl} 점유율`]];PL.forEach(p=>{const b=ag[p.id].bT1,c=ag[p.id].cT1;s2.push([p.name,b,c,b+c,sov(b,c)])});s2.push(['합계',t.bT1,t.cT1,t.bT1+t.cT1,sov(t.bT1,t.cT1)]);s2.push([],['📊 AI-TOP4'],['Platform',`${bl} 합계`,'경쟁사 합계','전체',`${bl} 점유율`]);PL.forEach(p=>{const b=ag[p.id].bT4,c=ag[p.id].cT4;s2.push([p.name,b,c,b+c,sov(b,c)])});s2.push(['합계',t.bT4,t.cT4,t.bT4+t.cT4,sov(t.bT4,t.cT4)]);s2.push([],['📊 AI-SOV'],['Platform',`${bl} 합계`,'경쟁사 합계','전체',`${bl} 점유율`]);PL.forEach(p=>{const b=ag[p.id].bM,c=ag[p.id].cM;s2.push([p.name,b,c,b+c,sov(b,c)])});s2.push(['합계',t.bM,t.cM,t.bM+t.cM,sov(t.bM,t.cM)]);const s3=[['종합 대시보드'],[],['지표',bl,'경쟁사',`${bl} 점유율`],['종합 AI-SOV',t.bM,t.cM,sov(t.bM,t.cM)],['AI-TOP1',t.bT1,t.cT1,sov(t.bT1,t.cT1)],['AI-TOP4',t.bT4,t.cT4,sov(t.bT4,t.cT4)]];const wb=XLSX.utils.book_new();const w1=XLSX.utils.aoa_to_sheet(s1);w1['!cols']=[{wch:5},{wch:14},{wch:10},{wch:50},{wch:5},{wch:12},{wch:13},{wch:12},{wch:13},{wch:13},{wch:13}];XLSX.utils.book_append_sheet(wb,w1,'스코어카드');const w2=XLSX.utils.aoa_to_sheet(s2);w2['!cols']=[{wch:16},{wch:14},{wch:14},{wch:8},{wch:14}];XLSX.utils.book_append_sheet(wb,w2,'플랫폼별 집계');const w3=XLSX.utils.aoa_to_sheet(s3);w3['!cols']=[{wch:28},{wch:12},{wch:12},{wch:16}];XLSX.utils.book_append_sheet(wb,w3,'종합 대시보드');XLSX.writeFile(wb,'AI-SOV_채점결과.xlsx')}
render();
</script>
